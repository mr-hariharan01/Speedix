openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: speedtest
    description: Speed test operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ping:
    get:
      operationId: ping
      tags: [speedtest]
      summary: Ping endpoint
      description: Returns pong for latency measurement
      responses:
        "200":
          description: Pong response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
  /download:
    get:
      operationId: download
      tags: [speedtest]
      summary: Download test
      description: Returns a 20MB binary buffer for download speed measurement
      responses:
        "200":
          description: Binary data for download test
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /upload:
    post:
      operationId: upload
      tags: [speedtest]
      summary: Upload test
      description: Accept data for upload speed measurement
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PingResponse:
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: number
      required:
        - message
        - timestamp
    UploadResponse:
      type: object
      properties:
        received:
          type: number
        message:
          type: string
      required:
        - received
        - message
